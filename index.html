<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSS Feeds</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --text: #e2e4ed;
      --muted: #7b7f96;
      --accent: #f26522;
      --accent-hover: #ff7a36;
      --radius: 10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 3rem 1.5rem 2rem;
      max-width: 680px;
      margin: 0 auto;
      width: 100%;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    header p {
      margin-top: 0.5rem;
      color: var(--muted);
      font-size: 1rem;
    }

    main {
      flex: 1;
      max-width: 680px;
      margin: 0 auto;
      width: 100%;
      padding: 0 1.5rem 3rem;
    }

    ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .feed-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      transition: border-color 0.15s;
    }

    .feed-card:hover {
      border-color: var(--accent);
    }

    .feed-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.4rem;
    }

    .rss-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      stroke: var(--accent);
    }

    .feed-header h2 {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .feed-header h2 a {
      color: var(--text);
      text-decoration: none;
    }

    .feed-header h2 a:hover {
      color: var(--accent);
    }

    .feed-desc {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 0.85rem;
    }

    .feed-link {
      display: inline-block;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--accent);
      text-decoration: none;
      border: 1px solid var(--accent);
      border-radius: 6px;
      padding: 0.3rem 0.75rem;
      transition: background 0.15s, color 0.15s;
    }

    .feed-link:hover {
      background: var(--accent);
      color: #fff;
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      color: var(--muted);
      font-size: 0.8rem;
      border-top: 1px solid var(--border);
    }

    footer a {
      color: var(--muted);
    }
  </style>
</head>
<body>
  <header>
    <h1>RSS Feeds</h1>
    <p>Custom feeds for newsletters that don&#8217;t provide one natively.</p>
  </header>
  <main>
    <ul>
        <li class="feed-card">
          <div class="feed-header">
            <svg class="rss-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <circle cx="5" cy="19" r="2"/>
              <path d="M4 4a16 16 0 0 1 16 16" stroke-width="2" stroke-linecap="round"/>
              <path d="M4 11a9 9 0 0 1 9 9" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <h2><a href="https://pointerio.beehiiv.com/" target="_blank" rel="noopener">Pointer</a></h2>
          </div>
          <p class="feed-desc">Essential Reading For Engineering Leaders</p>
          <a class="feed-link" href="feeds/pointer.xml">
            Subscribe to RSS feed &rarr;
          </a>
        </li>
    </ul>
  </main>
  <footer>
    <p>Updated 2026-03-10 20:40 UTC &middot; <a href="https://github.com/jiawenpan/rssfeeds">Source on GitHub</a></p>
  </footer>
</body>
</html>
